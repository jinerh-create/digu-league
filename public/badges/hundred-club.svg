<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Outer coin rim gradient -->
    <radialGradient id="rimGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <!-- Inner face gradient -->
    <radialGradient id="faceGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="40%" stop-color="#A8861A"/>
      <stop offset="100%" stop-color="#7A5F0A"/>
    </radialGradient>
    <!-- Raised text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF4A0"/>
      <stop offset="30%" stop-color="#FFE040"/>
      <stop offset="70%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#A07810"/>
    </linearGradient>
    <!-- Suit red gradient -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#AA0000"/>
    </linearGradient>
    <!-- Suit dark gradient -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="emboss" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FFE040" flood-opacity="0.6"/>
    </filter>
    <!-- Dotted rim pattern -->
    <pattern id="dots" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#8B6914" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Outer shadow -->
  <circle cx="100" cy="102" r="94" fill="#000000" opacity="0.4"/>

  <!-- Outer coin rim -->
  <circle cx="100" cy="100" r="94" fill="url(#rimGrad)"/>

  <!-- Rim highlight top-left -->
  <path d="M 30,55 A 75,75 0 0,1 170,55" stroke="#FFE88A" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Dotted inner ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#C9911A" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.7"/>

  <!-- Inner coin face -->
  <circle cx="100" cy="100" r="83" fill="url(#faceGrad)"/>

  <!-- Inner ring line -->
  <circle cx="100" cy="100" r="79" fill="none" stroke="#FFD030" stroke-width="1" opacity="0.5"/>

  <!-- ===== CROWN ===== -->
  <g transform="translate(100,18)" filter="url(#emboss)">
    <!-- Crown base -->
    <rect x="-13" y="8" width="26" height="5" rx="1" fill="url(#textGrad)"/>
    <!-- Crown body -->
    <path d="M -13,8 L -13,2 L -8,6 L 0,-2 L 8,6 L 13,2 L 13,8 Z" fill="url(#textGrad)"/>
    <!-- Crown dots -->
    <circle cx="-13" cy="2" r="2" fill="url(#textGrad)"/>
    <circle cx="0" cy="-2" r="2.5" fill="url(#textGrad)"/>
    <circle cx="13" cy="2" r="2" fill="url(#textGrad)"/>
  </g>

  <!-- ===== "100" ===== -->
  <text x="100" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="900"
    text-anchor="middle" fill="url(#textGrad)" filter="url(#emboss)" letter-spacing="-2">100</text>
  <!-- 100 shadow for depth -->
  <text x="101" y="93" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="900"
    text-anchor="middle" fill="#5A3800" opacity="0.3" letter-spacing="-2">100</text>
  <text x="100" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="900"
    text-anchor="middle" fill="url(#textGrad)" letter-spacing="-2">100</text>

  <!-- ===== "DIGU" with dashes ===== -->
  <line x1="38" y1="101" x2="56" y2="101" stroke="url(#textGrad)" stroke-width="2"/>
  <text x="100" y="104" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="900"
    text-anchor="middle" fill="url(#textGrad)" letter-spacing="4" filter="url(#emboss)">DIGU</text>
  <line x1="144" y1="101" x2="162" y2="101" stroke="url(#textGrad)" stroke-width="2"/>

  <!-- ===== LAUREL WREATHS ===== -->
  <!-- Left wreath -->
  <g opacity="0.85" filter="url(#emboss)">
    <ellipse cx="33" cy="78" rx="6" ry="3" fill="#C9911A" transform="rotate(-40,33,78)"/>
    <ellipse cx="27" cy="86" rx="6" ry="3" fill="#C9911A" transform="rotate(-50,27,86)"/>
    <ellipse cx="24" cy="96" rx="6" ry="3" fill="#C9911A" transform="rotate(-60,24,96)"/>
    <ellipse cx="24" cy="107" rx="6" ry="3" fill="#C9911A" transform="rotate(60,24,107)"/>
    <ellipse cx="27" cy="117" rx="6" ry="3" fill="#C9911A" transform="rotate(50,27,117)"/>
    <ellipse cx="33" cy="126" rx="6" ry="3" fill="#C9911A" transform="rotate(40,33,126)"/>
    <!-- Left stem -->
    <path d="M 38,70 Q 22,100 38,130" stroke="#A07810" stroke-width="2" fill="none"/>
    <!-- Left inner leaves -->
    <ellipse cx="38" cy="80" rx="5" ry="2.5" fill="#D4A017" transform="rotate(-35,38,80)"/>
    <ellipse cx="34" cy="90" rx="5" ry="2.5" fill="#D4A017" transform="rotate(-50,34,90)"/>
    <ellipse cx="33" cy="100" rx="5" ry="2.5" fill="#D4A017" transform="rotate(-55,33,100)"/>
    <ellipse cx="34" cy="110" rx="5" ry="2.5" fill="#D4A017" transform="rotate(50,34,110)"/>
    <ellipse cx="38" cy="120" rx="5" ry="2.5" fill="#D4A017" transform="rotate(35,38,120)"/>
  </g>

  <!-- Right wreath -->
  <g opacity="0.85" filter="url(#emboss)">
    <ellipse cx="167" cy="78" rx="6" ry="3" fill="#C9911A" transform="rotate(40,167,78)"/>
    <ellipse cx="173" cy="86" rx="6" ry="3" fill="#C9911A" transform="rotate(50,173,86)"/>
    <ellipse cx="176" cy="96" rx="6" ry="3" fill="#C9911A" transform="rotate(60,176,96)"/>
    <ellipse cx="176" cy="107" rx="6" ry="3" fill="#C9911A" transform="rotate(-60,176,107)"/>
    <ellipse cx="173" cy="117" rx="6" ry="3" fill="#C9911A" transform="rotate(-50,173,117)"/>
    <ellipse cx="167" cy="126" rx="6" ry="3" fill="#C9911A" transform="rotate(-40,167,126)"/>
    <!-- Right stem -->
    <path d="M 162,70 Q 178,100 162,130" stroke="#A07810" stroke-width="2" fill="none"/>
    <!-- Right inner leaves -->
    <ellipse cx="162" cy="80" rx="5" ry="2.5" fill="#D4A017" transform="rotate(35,162,80)"/>
    <ellipse cx="166" cy="90" rx="5" ry="2.5" fill="#D4A017" transform="rotate(50,166,90)"/>
    <ellipse cx="167" cy="100" rx="5" ry="2.5" fill="#D4A017" transform="rotate(55,167,100)"/>
    <ellipse cx="166" cy="110" rx="5" ry="2.5" fill="#D4A017" transform="rotate(-50,166,110)"/>
    <ellipse cx="162" cy="120" rx="5" ry="2.5" fill="#D4A017" transform="rotate(-35,162,120)"/>
  </g>

  <!-- ===== CARD SUITS ===== -->
  <!-- Spade ♠ -->
  <g transform="translate(58,128)" filter="url(#emboss)">
    <path d="M 0,-10 C -8,0 -10,6 -4,8 C -6,10 -3,12 0,12 C 3,12 6,10 4,8 C 10,6 8,0 0,-10 Z" fill="url(#darkGrad)" stroke="#555" stroke-width="0.5"/>
    <rect x="-3" y="10" width="6" height="4" rx="1" fill="url(#darkGrad)"/>
  </g>
  <!-- Heart ♥ -->
  <g transform="translate(82,128)" filter="url(#emboss)">
    <path d="M 0,12 C -8,4 -12,-2 -8,-7 C -5,-11 0,-8 0,-5 C 0,-8 5,-11 8,-7 C 12,-2 8,4 0,12 Z" fill="url(#redGrad)" stroke="#880000" stroke-width="0.5"/>
  </g>
  <!-- Diamond ♦ -->
  <g transform="translate(106,128)" filter="url(#emboss)">
    <path d="M 0,-11 L 8,0 L 0,11 L -8,0 Z" fill="url(#redGrad)" stroke="#880000" stroke-width="0.5"/>
  </g>
  <!-- Club ♣ -->
  <g transform="translate(130,128)" filter="url(#emboss)">
    <circle cx="0" cy="-4" r="5.5" fill="url(#darkGrad)" stroke="#555" stroke-width="0.5"/>
    <circle cx="-5" cy="2" r="5" fill="url(#darkGrad)" stroke="#555" stroke-width="0.5"/>
    <circle cx="5" cy="2" r="5" fill="url(#darkGrad)" stroke="#555" stroke-width="0.5"/>
    <rect x="-3" y="6" width="6" height="5" rx="1" fill="url(#darkGrad)"/>
  </g>

  <!-- ===== BOTTOM STAR + LINES ===== -->
  <line x1="55" y1="155" x2="85" y2="155" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.8"/>
  <polygon points="100,148 102,153 108,153 103,157 105,162 100,158 95,162 97,157 92,153 98,153"
    fill="url(#textGrad)" filter="url(#emboss)"/>
  <line x1="115" y1="155" x2="145" y2="155" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.8"/>

  <!-- Final rim highlight -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#FFE88A" stroke-width="1" opacity="0.3"/>
</svg>
